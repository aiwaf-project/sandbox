    environment:
      TARGET_BASE_URL: http://juice:3000
      PORT: 3011
      AIWAF_LOG_DIR: /logs
      AIWAF_LOG_FORMAT: json
    depends_on:
      juice:
        condition: service_started
    volumes:
      - aiwaf_logs:/logs

  aiwaf:
    build:
      context: .
      dockerfile: examples/sandbox/aiwaf-proxy/Dockerfile
    container_name: aiwaf_proxy_all
    ports:
      - "3000:3000"
    environment:
      TARGET_BASE_URL: http://juice:3000
      PORT: 3000
      AIWAF_GEO_BLOCK_ENABLED: "false"
      AIWAF_CLEAR_STATE_ON_START: "true"
      AIWAF_MIN_AI_LOGS: "10000"
      AIWAF_WASM_HEADER_VALIDATION: "false"
      AIWAF_DEBUG_WASM_HEADERS: "true"
      AIWAF_MIDDLEWARE_LOGGING: "true"
      AIWAF_MIDDLEWARE_LOG_PATH: /logs/aiwaf-requests.jsonl
      AIWAF_DEBUG_HEADERS: "true"
    depends_on:
      juice:
        condition: service_started
    volumes:
