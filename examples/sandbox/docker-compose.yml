services:
  aiwaf-java:
    build:
      context: ../..
      dockerfile: examples/sandbox/aiwaf-java/Dockerfile
    container_name: aiwaf-java-proxy
    ports:
      - "8080:8080"
    environment:
      TARGET_BASE_URL: http://juice:3000
      PORT: 8080

  aiwaf-spring:
    build:
      context: ../..
      dockerfile: examples/sandbox/aiwaf-spring/Dockerfile
    container_name: aiwaf-spring-proxy
    ports:
      - "8081:8081"
    environment:
      TARGET_BASE_URL: http://juice:3000
      PORT: 8081

  juice:
    image: bkimminich/juice-shop
    container_name: juice_shop
    ports:
      - "3001:3000"
